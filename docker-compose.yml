services:
  ugk-pi:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
      ugk-pi-browser-cdp:
        condition: service_started
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      CONN_DATABASE_PATH: /var/lib/ugk-pi/conn/conn.sqlite
      PUBLIC_BASE_URL: http://127.0.0.1:3000
      WEB_ACCESS_BROWSER_PUBLIC_BASE_URL: http://ugk-pi:3000
      WEB_ACCESS_BROWSER_PROVIDER: direct_cdp
      WEB_ACCESS_CDP_HOST: 172.31.250.10
      WEB_ACCESS_CDP_PORT: 9223
      WEB_ACCESS_BROWSER_UPLOAD_APP_DIR: /app/.data/browser-upload
      WEB_ACCESS_BROWSER_UPLOAD_BROWSER_DIR: /config/upload
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - ugk-pi-conn-db:/var/lib/ugk-pi/conn
      - ${UGK_BROWSER_UPLOAD_DIR:-./.data/chrome-sidecar/upload}:/app/.data/browser-upload
    command: npm run dev
    networks:
      - ugk-pi-net
  ugk-pi-conn-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
      ugk-pi-browser-cdp:
        condition: service_started
    env_file:
      - .env
    environment:
      CONN_DATABASE_PATH: /var/lib/ugk-pi/conn/conn.sqlite
      CONN_WORKER_MAX_CONCURRENCY: ${CONN_WORKER_MAX_CONCURRENCY:-3}
      NOTIFICATION_BROADCAST_URL: http://ugk-pi:3000/v1/internal/notifications/broadcast
      WEB_ACCESS_BROWSER_PUBLIC_BASE_URL: http://ugk-pi:3000
      WEB_ACCESS_BROWSER_PROVIDER: direct_cdp
      WEB_ACCESS_CDP_HOST: 172.31.250.10
      WEB_ACCESS_CDP_PORT: 9223
      WEB_ACCESS_BROWSER_UPLOAD_APP_DIR: /app/.data/browser-upload
      WEB_ACCESS_BROWSER_UPLOAD_BROWSER_DIR: /config/upload
    volumes:
      - .:/app
      - /app/node_modules
      - ugk-pi-conn-db:/var/lib/ugk-pi/conn
      - ${UGK_BROWSER_UPLOAD_DIR:-./.data/chrome-sidecar/upload}:/app/.data/browser-upload
    command: npm run worker:conn
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - ugk-pi-net
  ugk-pi-feishu-worker:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      ugk-pi:
        condition: service_started
    env_file:
      - .env
    environment:
      FEISHU_AGENT_BASE_URL: http://ugk-pi:3000
      PUBLIC_BASE_URL: http://127.0.0.1:3000
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run worker:feishu
    healthcheck:
      disable: true
    restart: unless-stopped
    networks:
      - ugk-pi-net
  ugk-pi-browser:
    image: lscr.io/linuxserver/chrome:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Asia/Shanghai
      DISPLAY: ":0"
      SELKIES_USE_BROWSER_CURSORS: "true"
      WEB_ACCESS_BROWSER_PROFILE_DIR: ${WEB_ACCESS_BROWSER_PROFILE_DIR:-/config/chrome-profile-sidecar}
      CHROME_CLI: "--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --hide-crash-restore-bubble --js-flags=--max-old-space-size=1536 --ozone-platform=x11 --user-data-dir=${WEB_ACCESS_BROWSER_PROFILE_DIR:-/config/chrome-profile-sidecar} about:blank"
    volumes:
      - ./.data/chrome-sidecar:/config
      - ${UGK_BROWSER_UPLOAD_DIR:-./.data/chrome-sidecar/upload}:/config/upload
      - ./scripts/ensure-sidecar-chrome.sh:/usr/local/bin/ensure-sidecar-chrome.sh:ro
    ports:
      - "127.0.0.1:${WEB_ACCESS_BROWSER_GUI_PORT:-3901}:3001"
    shm_size: "1gb"
    mem_limit: ${UGK_BROWSER_MEM_LIMIT:-2g}
    mem_reservation: ${UGK_BROWSER_MEM_RESERVATION:-512m}
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/ensure-sidecar-chrome.sh"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      ugk-pi-net:
        ipv4_address: 172.31.250.10
  ugk-pi-browser-cdp:
    image: alpine/socat:latest
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
    network_mode: "service:ugk-pi-browser"
    command:
      - "TCP-LISTEN:9223,fork,bind=0.0.0.0,reuseaddr"
      - "TCP:127.0.0.1:9222"
    restart: unless-stopped

volumes:
  ugk-pi-conn-db:

networks:
  ugk-pi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.250.0/24
