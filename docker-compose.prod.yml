services:
  ugk-pi:
    image: ugk-pi:prod
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    env_file:
      - ${UGK_APP_ENV_FILE:-.env}
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
      WEB_ACCESS_BROWSER_PUBLIC_BASE_URL: http://ugk-pi:3000
      WEB_ACCESS_BROWSER_PROVIDER: direct_cdp
      WEB_ACCESS_CDP_HOST: 172.31.250.10
      WEB_ACCESS_CDP_PORT: 9223
    volumes:
      - ${UGK_APP_LOG_DIR:-./logs/app}:/var/log/ugk-pi
      - ${UGK_AGENT_DATA_DIR:-./.data/agent}:/app/.data/agent
      - ./runtime/skills-user:/app/runtime/skills-user
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
      ugk-pi-browser-cdp:
        condition: service_started
    restart: unless-stopped
    command: /bin/sh -lc "mkdir -p /var/log/ugk-pi && npm start 2>&1 | tee -a /var/log/ugk-pi/app.log"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
        retries: 3
      start_period: 20s
    networks:
      - ugk-pi-net
  ugk-pi-conn-worker:
    image: ugk-pi:prod
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    env_file:
      - ${UGK_APP_ENV_FILE:-.env}
    environment:
      CONN_WORKER_MAX_CONCURRENCY: ${CONN_WORKER_MAX_CONCURRENCY:-3}
      NOTIFICATION_BROADCAST_URL: http://ugk-pi:3000/v1/internal/notifications/broadcast
      WEB_ACCESS_BROWSER_PUBLIC_BASE_URL: http://ugk-pi:3000
      WEB_ACCESS_BROWSER_PROVIDER: direct_cdp
      WEB_ACCESS_CDP_HOST: 172.31.250.10
      WEB_ACCESS_CDP_PORT: 9223
    volumes:
      - ${UGK_APP_LOG_DIR:-./logs/app}:/var/log/ugk-pi
      - ${UGK_AGENT_DATA_DIR:-./.data/agent}:/app/.data/agent
      - ./runtime/skills-user:/app/runtime/skills-user
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
      ugk-pi-browser-cdp:
        condition: service_started
    restart: unless-stopped
    command: /bin/sh -lc "mkdir -p /var/log/ugk-pi && npm run worker:conn 2>&1 | tee -a /var/log/ugk-pi/conn-worker.log"
    healthcheck:
      disable: true
    networks:
      - ugk-pi-net
  ugk-pi-browser:
    image: lscr.io/linuxserver/chrome:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TZ:-Asia/Shanghai}
      DISPLAY: ":0"
      SELKIES_USE_BROWSER_CURSORS: "true"
      WEB_ACCESS_BROWSER_PROFILE_DIR: ${WEB_ACCESS_BROWSER_PROFILE_DIR:-/config/chrome-profile-sidecar}
      CHROME_CLI: "--remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --hide-crash-restore-bubble --ozone-platform=x11 --user-data-dir=${WEB_ACCESS_BROWSER_PROFILE_DIR:-/config/chrome-profile-sidecar} about:blank"
    volumes:
      - ${UGK_BROWSER_CONFIG_DIR:-./.data/chrome-sidecar}:/config
      - ./scripts/ensure-sidecar-chrome.sh:/usr/local/bin/ensure-sidecar-chrome.sh:ro
    ports:
      - "127.0.0.1:${WEB_ACCESS_BROWSER_GUI_PORT:-3901}:3001"
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sh /usr/local/bin/ensure-sidecar-chrome.sh"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      ugk-pi-net:
        ipv4_address: 172.31.250.10
  ugk-pi-browser-cdp:
    image: alpine/socat:latest
    depends_on:
      ugk-pi-browser:
        condition: service_healthy
    network_mode: "service:ugk-pi-browser"
    command:
      - "TCP-LISTEN:9223,fork,bind=0.0.0.0,reuseaddr"
      - "TCP:127.0.0.1:9222"
    restart: unless-stopped
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      ugk-pi:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-3000}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${UGK_NGINX_LOG_DIR:-./logs/nginx}:/var/log/nginx
    restart: unless-stopped
    networks:
      - ugk-pi-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  ugk-pi-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.250.0/24
