services:
  ugk-pi:
    image: ugk-pi:prod
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    env_file:
      - .env
    environment:
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-3000}
    volumes:
      - ./logs/app:/var/log/ugk-pi
      - ./runtime/skills-user:/app/runtime/skills-user
    restart: unless-stopped
    command: /bin/sh -lc "mkdir -p /var/log/ugk-pi && npm start 2>&1 | tee -a /var/log/ugk-pi/app.log"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      ugk-pi:
        condition: service_healthy
    ports:
      - "${HOST_PORT:-3000}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./logs/nginx:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
