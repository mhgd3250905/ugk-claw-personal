# SearXNG settings for the UGK CLAW internal explicit-search skill.
#
# This instance is intended for app/worker internal use only. Do not expose it
# publicly without adding proper limiter / reverse-proxy controls.

use_default_settings: true

general:
  debug: false
  instance_name: "UGK CLAW SearXNG"

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  # Overridden by the SEARXNG_SECRET environment variable in Docker.
  secret_key: "replace-me-with-random-secret"
  limiter: false
  image_proxy: false
